<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="900" version="1.1" viewBox="0 0 1400 900" width="1400" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs><marker id="arrow" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1d2737" /></marker><marker id="arrow_white" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><path d="M 0 0 L 10 5 L 0 10 z" fill="white" /></marker><marker id="dot" markerHeight="8" markerWidth="8" orient="auto" refX="4" refY="4"><circle cx="4" cy="4" fill="#1d2737" r="3" /></marker></defs><rect fill="#0b1736" height="900" width="1400" x="0" y="0" /><text fill="white" font-family="DejaVu Sans, Arial, sans-serif" font-size="34" font-weight="700" x="50" y="60">Рис. 3. Пятно контакта «колесо — рельс»</text><text fill="#cfd6e2" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" x="50" y="95">На высокой скорости микроскопическая зона контакта решает износ, шум, вибрацию и безопасность.</text><rect fill="#7c8aa1" height="28" rx="8" width="940" x="230" y="560" /><rect fill="#51627d" height="55" rx="8" width="760" x="320" y="588" /><rect fill="#51627d" height="36" rx="6" width="1080" x="160" y="650" /><circle cx="560" cy="425" fill="#d8dee8" r="160" stroke="#94a3b8" stroke-width="4" /><circle cx="560" cy="425" fill="#0b1736" r="92" stroke="#475569" stroke-width="4" /><ellipse cx="610" cy="560" fill="#facc15" opacity="0.9" rx="110" ry="18" /><ellipse cx="610" cy="560" fill="#ef4444" opacity="0.95" rx="75" ry="12" /><line marker-end="url(#arrow_white)" stroke="white" stroke-width="5" x1="560" x2="560" y1="320" y2="510" /><text fill="white" font-family="DejaVu Sans, Arial, sans-serif" font-size="26" font-weight="700" x="573" y="360">N</text><text fill="#cfd6e2" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" x="595" y="380">вертикальная нагрузка</text><line marker-end="url(#arrow)" stroke="#22c55e" stroke-width="4" x1="470" x2="330" y1="575" y2="620" /><text fill="#22c55e" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" x="190" y="640">касательная сила / тяга</text><line marker-end="url(#arrow)" stroke="#f97316" stroke-width="4" x1="742" x2="860" y1="575" y2="620" /><text fill="#f97316" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" x="866" y="640">фланец, износ, боковые силы</text><line marker-end="url(#arrow_white)" stroke="white" stroke-width="2.2" x1="950" x2="760" y1="480" y2="545" /><text fill="white" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" text-anchor="start" x="782" y="537">пятно контакта в реальности маленькое, но работает как силовая зона</text><text fill="#7b8799" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" x="50" y="872">Схема условная. Геометрия колеса и рельса показана укрупнённо ради читабельности.</text></svg>