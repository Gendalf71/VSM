<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="900" version="1.1" viewBox="0 0 1600 900" width="1600" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs><marker id="arrow" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937" /></marker><marker id="arrow_white" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff" /></marker><marker id="arrow_red" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" /></marker><marker id="arrow_blue" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" /></marker><marker id="arrow_green" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e" /></marker></defs><rect fill="#0b1736" height="900" width="1600" x="0" y="0" /><text fill="#ffffff" font-family="DejaVu Sans, Arial, sans-serif" font-size="38" font-weight="700" text-anchor="start" x="60" y="58">Рис. 3. Пятно контакта «колесо — рельс»</text><text fill="#cbd5e1" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" font-weight="normal" text-anchor="start" x="60" y="96">Маленькая зона контакта определяет износ, шум, вибрацию и безопасность.</text><rect fill="#8b9ab2" height="30" rx="8" width="830" x="330" y="570" /><rect fill="#53647d" height="58" rx="8" width="710" x="390" y="600" /><rect fill="#40516a" height="35" rx="6" width="1020" x="240" y="662" /><circle cx="720" cy="405" fill="#e2e8f0" r="168" stroke="#94a3b8" stroke-width="5" /><circle cx="720" cy="405" fill="#0b1736" r="95" stroke="#526176" stroke-width="4" /><ellipse cx="772" cy="570" fill="#fde047" rx="130" ry="22" /><ellipse cx="772" cy="570" fill="#ef4444" rx="78" ry="13" /><rect fill="#142449" height="105" rx="12" ry="12" stroke="#315281" stroke-width="1.4" width="350" x="70" y="220" /><text fill="#ffffff" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="start" x="86" y="247">Вертикальная нагрузка N</text><text fill="#d5deec" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="86" y="270">идёт через колесо в микрозону контакта</text><rect fill="#142449" height="105" rx="12" ry="12" stroke="#315281" stroke-width="1.4" width="360" x="70" y="600" /><text fill="#ffffff" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="start" x="86" y="627">Касательная сила</text><text fill="#d5deec" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="86" y="650">тяга, торможение, риск юза и износа</text><rect fill="#142449" height="120" rx="12" ry="12" stroke="#315281" stroke-width="1.4" width="390" x="1140" y="360" /><text fill="#ffffff" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="start" x="1156" y="387">Пятно контакта</text><text fill="#d5deec" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="1156" y="410">в реальности мало, но именно здесь рождаются</text><text fill="#d5deec" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="1156" y="427">нагрузки, шум и усталость</text><rect fill="#142449" height="100" rx="12" ry="12" stroke="#315281" stroke-width="1.4" width="380" x="1130" y="610" /><text fill="#ffffff" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="start" x="1146" y="637">Боковые силы</text><text fill="#d5deec" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="1146" y="660">особенно важны на кривых и стрелочных</text><text fill="#d5deec" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="1146" y="677">переводах</text><line marker-end="url(#arrow_white)" stroke="#ffffff" stroke-width="2" x1="420" x2="720" y1="260" y2="500" /><line marker-end="url(#arrow_green)" stroke="#22c55e" stroke-width="3" x1="430" x2="690" y1="650" y2="585" /><line marker-end="url(#arrow_white)" stroke="#ffffff" stroke-width="2" x1="1140" x2="775" y1="420" y2="570" /><line marker-end="url(#arrow)" stroke="#f59e0b" stroke-width="3" x1="1130" x2="890" y1="660" y2="590" /><line marker-end="url(#arrow_white)" stroke="#ffffff" stroke-width="6" x1="720" x2="720" y1="285" y2="510" /><text fill="#ffffff" font-family="DejaVu Sans, Arial, sans-serif" font-size="30" font-weight="700" x="742" y="340">N</text><text fill="#aebbd0" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="60" y="866">Схема условная. Геометрия колеса и рельса укрупнена ради читаемости.</text></svg>