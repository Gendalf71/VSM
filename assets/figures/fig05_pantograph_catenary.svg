<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Рис. 5. Пантограф и контактная сеть">
<title>Рис. 5. Пантограф и контактная сеть</title>
<defs>
  <style>
    .bg { fill:#0f172a; }
    .panel { fill:#111827; stroke:#334155; stroke-width:2; }
    .panel2 { fill:#f8fafc; stroke:#cbd5e1; stroke-width:2; }
    .title { font-family:'DejaVu Sans', Arial, sans-serif; font-size:42px; font-weight:700; fill:#f8fafc; }
    .subtitle { font-family:'DejaVu Sans', Arial, sans-serif; font-size:24px; fill:#cbd5e1; }
    .label { font-family:'DejaVu Sans', Arial, sans-serif; font-size:22px; fill:#e5e7eb; }
    .small { font-family:'DejaVu Sans', Arial, sans-serif; font-size:17px; fill:#cbd5e1; }
    .darklabel { font-family:'DejaVu Sans', Arial, sans-serif; font-size:22px; fill:#111827; }
    .darksmall { font-family:'DejaVu Sans', Arial, sans-serif; font-size:17px; fill:#334155; }
    .note { font-family:'DejaVu Sans', Arial, sans-serif; font-size:15px; fill:#94a3b8; }
    .red { stroke:#ef4444; } .violet { stroke:#a855f7; } .cyan { stroke:#06b6d4; } .orange { stroke:#f59e0b; } .green { stroke:#22c55e; } .blue { stroke:#3b82f6; }
    .thin { stroke-width:3; fill:none; } .thick { stroke-width:9; fill:none; stroke-linecap:round; stroke-linejoin:round; }
    .dash { stroke-dasharray:16 10; }
  </style>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#e5e7eb" />
  </marker>
  <marker id="arrowDark" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#111827" />
  </marker>
</defs>

<rect x="0" y="0" width="1600" height="900" fill="#0f172a"/>
<text class="title" x="70" y="78">Рис. 5. Токосъём на 360–400 км/ч</text>
<text class="subtitle" x="70" y="116">Пантограф возбуждает волну в проводе; допустимые отрывы считаются уже миллисекундами.</text>
<!-- catenary system -->
<line x1="120" y1="230" x2="1480" y2="230" stroke="#94a3b8" stroke-width="5"/>
<path d="M120 260 C300 220,470 310,650 260 C835 208,1010 310,1190 260 C1300 235,1395 235,1480 260" fill="none" stroke="#facc15" stroke-width="6"/>
<line x1="120" y1="260" x2="1480" y2="260" stroke="#f97316" stroke-width="4"/>
<g stroke="#94a3b8" stroke-width="3">
  <line x1="230" y1="230" x2="230" y2="255"/><line x1="420" y1="230" x2="420" y2="275"/><line x1="610" y1="230" x2="610" y2="265"/><line x1="800" y1="230" x2="800" y2="245"/><line x1="990" y1="230" x2="990" y2="276"/><line x1="1180" y1="230" x2="1180" y2="262"/><line x1="1370" y1="230" x2="1370" y2="252"/>
</g>
<text class="label" x="100" y="190">несущий трос и контактный провод</text>
<!-- wave arrow -->
<path d="M1080 300 C1150 260,1210 330,1280 295 C1330 270,1375 295,1420 285" fill="none" stroke="#38bdf8" stroke-width="5" marker-end="url(#arrow)"/>
<text class="small" x="1090" y="360">волна в контактной сети</text>
<!-- train roof -->
<rect x="210" y="565" width="1180" height="145" rx="60" fill="#e5e7eb" stroke="#94a3b8" stroke-width="5"/>
<rect x="310" y="610" width="150" height="45" rx="10" fill="#bae6fd"/><rect x="500" y="610" width="150" height="45" rx="10" fill="#bae6fd"/><rect x="690" y="610" width="150" height="45" rx="10" fill="#bae6fd"/><rect x="880" y="610" width="150" height="45" rx="10" fill="#bae6fd"/><rect x="1070" y="610" width="150" height="45" rx="10" fill="#bae6fd"/>
<!-- pantograph -->
<line x1="760" y1="565" x2="660" y2="365" stroke="#ef4444" stroke-width="10"/>
<line x1="840" y1="565" x2="930" y2="365" stroke="#ef4444" stroke-width="10"/>
<line x1="660" y1="365" x2="930" y2="365" stroke="#ef4444" stroke-width="10"/>
<rect x="735" y="540" width="135" height="25" rx="8" fill="#ef4444"/>
<line x1="795" y1="365" x2="795" y2="260" stroke="#22c55e" stroke-width="5" stroke-dasharray="12 8"/>
<text class="label" x="860" y="410">контактная сила</text><line x1="850" y1="405" x2="805" y2="275" stroke="#e5e7eb" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="80" y="730" width="650" height="95" rx="18" fill="#1e293b" stroke="#475569" stroke-width="2"/>
<text class="small" x="105" y="765">Контрольные вопросы ТЗ: 25 кВ 50 Гц? 2×25 кВ?</text>
<text class="small" x="105" y="795">однорычажный пантограф? допустимый отрыв 5–10 мс?</text>
<text class="small" x="105" y="825">диагностика провода и контактных вставок?</text>
<text class="note" x="70" y="870">Авторская схема. Не является проектом контактной сети конкретной линии.</text>
</svg>