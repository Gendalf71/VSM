<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="900" version="1.1" viewBox="0 0 1600 900" width="1600" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs><marker id="arrow" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937" /></marker><marker id="arrow_white" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff" /></marker><marker id="arrow_red" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" /></marker><marker id="arrow_blue" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" /></marker><marker id="arrow_green" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e" /></marker></defs><rect fill="#f6f8fc" height="900" width="1600" x="0" y="0" /><text fill="#1f2937" font-family="DejaVu Sans, Arial, sans-serif" font-size="38" font-weight="700" text-anchor="start" x="60" y="58">Рис. 2. Безбалластный путь ВСМ на слабом грунте</text><text fill="#64748b" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" font-weight="normal" text-anchor="start" x="60" y="96">Слои разведены: рельс, плита, основание и сваи читаются отдельно.</text><rect fill="#d8c6a6" height="150" width="1600" x="0" y="515" /><rect fill="#b9a281" height="235" width="1600" x="0" y="665" /><rect fill="#d7e0eb" height="54" rx="8" stroke="#64748b" stroke-width="2" width="1080" x="260" y="300" /><rect fill="#6b7d95" height="50" width="1000" x="300" y="354" /><rect fill="#9aaabd" height="235" stroke="#64748b" stroke-width="1.5" width="28" x="350" y="354" /><rect fill="#9aaabd" height="235" stroke="#64748b" stroke-width="1.5" width="28" x="520" y="354" /><rect fill="#9aaabd" height="235" stroke="#64748b" stroke-width="1.5" width="28" x="690" y="354" /><rect fill="#9aaabd" height="235" stroke="#64748b" stroke-width="1.5" width="28" x="860" y="354" /><rect fill="#9aaabd" height="235" stroke="#64748b" stroke-width="1.5" width="28" x="1030" y="354" /><rect fill="#9aaabd" height="235" stroke="#64748b" stroke-width="1.5" width="28" x="1200" y="354" /><rect fill="#4b5563" height="84" width="22" x="509" y="180" /><rect fill="#4b5563" height="15" width="96" x="472" y="168" /><polygon fill="#f97316" points="486,264 554,264 538,305 502,305" /><rect fill="#4b5563" height="84" width="22" x="1069" y="180" /><rect fill="#4b5563" height="15" width="96" x="1032" y="168" /><polygon fill="#f97316" points="1046,264 1114,264 1098,305 1062,305" /><rect fill="#ffffff" height="86" rx="12" ry="12" stroke="#cbd5e1" stroke-width="1.4" width="310" x="80" y="160" /><text fill="#1f2937" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="start" x="96" y="187">1. Рельс и скрепление</text><text fill="#64748b" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="96" y="210">передают нагрузку на плиту</text><rect fill="#ffffff" height="98" rx="12" ry="12" stroke="#cbd5e1" stroke-width="1.4" width="330" x="1180" y="170" /><text fill="#1f2937" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="start" x="1196" y="197">2. Бетонная плита</text><text fill="#64748b" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="1196" y="220">держит геометрию пути без балластной</text><text fill="#64748b" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="1196" y="237">подбивки</text><rect fill="#ffffff" height="92" rx="12" ry="12" stroke="#cbd5e1" stroke-width="1.4" width="330" x="1180" y="365" /><text fill="#1f2937" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="start" x="1196" y="392">3. Основание</text><text fill="#64748b" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="1196" y="415">распределяет нагрузку по опорам</text><rect fill="#ffffff" height="98" rx="12" ry="12" stroke="#cbd5e1" stroke-width="1.4" width="330" x="1180" y="585" /><text fill="#1f2937" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="start" x="1196" y="612">4. Сваи</text><text fill="#64748b" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="1196" y="635">уходят к устойчивым слоям грунта</text><rect fill="#ffffff" height="92" rx="12" ry="12" stroke="#cbd5e1" stroke-width="1.4" width="360" x="80" y="610" /><text fill="#1f2937" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="start" x="96" y="637">5. Слабый грунт</text><text fill="#64748b" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="96" y="660">мороз, вода и сезонные деформации</text><line marker-end="url(#arrow)" stroke="#1f2937" stroke-width="2" x1="390" x2="490" y1="205" y2="180" /><line marker-end="url(#arrow)" stroke="#1f2937" stroke-width="2" x1="1180" x2="1126" y1="220" y2="300" /><line marker-end="url(#arrow)" stroke="#1f2937" stroke-width="2" x1="1180" x2="1180" y1="410" y2="352" /><line marker-end="url(#arrow)" stroke="#1f2937" stroke-width="2" x1="1180" x2="1214" y1="630" y2="520" /><line marker-end="url(#arrow)" stroke="#1f2937" stroke-width="2" x1="440" x2="365" y1="655" y2="560" /><text fill="#7a8799" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="60" y="866">Авторская схема. Конструкция условная; задача — показать, почему ВСМ требует жёсткой опоры.</text></svg>