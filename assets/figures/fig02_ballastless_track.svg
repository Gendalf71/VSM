<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Рис. 2. Поперечник безбалластного пути">
<title>Рис. 2. Поперечник безбалластного пути</title>
<defs>
  <style>
    .bg { fill:#0f172a; }
    .panel { fill:#111827; stroke:#334155; stroke-width:2; }
    .panel2 { fill:#f8fafc; stroke:#cbd5e1; stroke-width:2; }
    .title { font-family:'DejaVu Sans', Arial, sans-serif; font-size:42px; font-weight:700; fill:#f8fafc; }
    .subtitle { font-family:'DejaVu Sans', Arial, sans-serif; font-size:24px; fill:#cbd5e1; }
    .label { font-family:'DejaVu Sans', Arial, sans-serif; font-size:22px; fill:#e5e7eb; }
    .small { font-family:'DejaVu Sans', Arial, sans-serif; font-size:17px; fill:#cbd5e1; }
    .darklabel { font-family:'DejaVu Sans', Arial, sans-serif; font-size:22px; fill:#111827; }
    .darksmall { font-family:'DejaVu Sans', Arial, sans-serif; font-size:17px; fill:#334155; }
    .note { font-family:'DejaVu Sans', Arial, sans-serif; font-size:15px; fill:#94a3b8; }
    .red { stroke:#ef4444; } .violet { stroke:#a855f7; } .cyan { stroke:#06b6d4; } .orange { stroke:#f59e0b; } .green { stroke:#22c55e; } .blue { stroke:#3b82f6; }
    .thin { stroke-width:3; fill:none; } .thick { stroke-width:9; fill:none; stroke-linecap:round; stroke-linejoin:round; }
    .dash { stroke-dasharray:16 10; }
  </style>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#e5e7eb" />
  </marker>
  <marker id="arrowDark" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#111827" />
  </marker>
</defs>

<rect x="0" y="0" width="1600" height="900" fill="#f8fafc"/>
<text x="70" y="78" style="font-family:DejaVu Sans,Arial; font-size:42px; font-weight:700; fill:#111827">Рис. 2. Безбалластный путь ВСМ на слабом грунте</text>
<text x="70" y="116" style="font-family:DejaVu Sans,Arial; font-size:23px; fill:#475569">Не «новые рельсы», а жёсткая геометрия: рельс → плита → основание → сваи.</text>
<!-- ground layers -->
<rect x="0" y="650" width="1600" height="250" fill="#c7b299"/>
<rect x="0" y="735" width="1600" height="165" fill="#9f8f74" opacity="0.75"/>
<path d="M0 650 C180 625,260 675,430 650 C620 620,760 680,930 645 C1130 610,1280 680,1600 645 L1600 735 L0 735 Z" fill="#d6c1a2"/>
<text x="100" y="705" style="font-family:DejaVu Sans,Arial; font-size:22px; fill:#3f2f1f">слабый грунт / болото / сезонные деформации</text>
<!-- piles -->
<g fill="#94a3b8" stroke="#475569" stroke-width="3">
  <rect x="300" y="510" width="42" height="330" rx="8"/>
  <rect x="515" y="510" width="42" height="330" rx="8"/>
  <rect x="730" y="510" width="42" height="330" rx="8"/>
  <rect x="945" y="510" width="42" height="330" rx="8"/>
  <rect x="1160" y="510" width="42" height="330" rx="8"/>
</g>
<text x="1185" y="618" style="font-family:DejaVu Sans,Arial; font-size:22px; fill:#111827">сваи передают нагрузку в устойчивый слой</text>
<line x1="1135" y1="610" x2="987" y2="590" stroke="#111827" stroke-width="3" marker-end="url(#arrowDark)"/>
<!-- base and slab -->
<rect x="225" y="460" width="1050" height="60" fill="#64748b" stroke="#334155" stroke-width="3"/>
<rect x="180" y="385" width="1140" height="80" rx="8" fill="#cbd5e1" stroke="#475569" stroke-width="4"/>
<rect x="145" y="330" width="1210" height="60" rx="8" fill="#e2e8f0" stroke="#64748b" stroke-width="4"/>
<text x="1240" y="370" style="font-family:DejaVu Sans,Arial; font-size:20px; fill:#111827">бетонная плита</text>
<line x1="1225" y1="365" x2="1120" y2="365" stroke="#111827" stroke-width="3" marker-end="url(#arrowDark)"/>
<text x="1240" y="445" style="font-family:DejaVu Sans,Arial; font-size:20px; fill:#111827">основание</text>
<line x1="1225" y1="438" x2="1120" y2="430" stroke="#111827" stroke-width="3" marker-end="url(#arrowDark)"/>
<!-- rails and fasteners -->
<g>
  <rect x="420" y="260" width="80" height="20" fill="#334155"/>
  <rect x="445" y="190" width="30" height="70" fill="#475569"/>
  <rect x="405" y="175" width="110" height="20" rx="6" fill="#334155"/>
  <rect x="1080" y="260" width="80" height="20" fill="#334155"/>
  <rect x="1105" y="190" width="30" height="70" fill="#475569"/>
  <rect x="1065" y="175" width="110" height="20" rx="6" fill="#334155"/>
</g>
<g fill="#f97316" stroke="#9a3412" stroke-width="2">
  <path d="M410 285 L520 285 L495 330 L435 330 Z"/>
  <path d="M1070 285 L1180 285 L1155 330 L1095 330 Z"/>
</g>
<text x="205" y="210" style="font-family:DejaVu Sans,Arial; font-size:22px; fill:#111827">рельс + скрепление</text>
<line x1="385" y1="210" x2="430" y2="190" stroke="#111827" stroke-width="3" marker-end="url(#arrowDark)"/>
<path d="M565 160 C720 125,865 125,1015 160" fill="none" stroke="#0ea5e9" stroke-width="5" stroke-dasharray="12 10"/>
<text x="610" y="148" style="font-family:DejaVu Sans,Arial; font-size:20px; fill:#0369a1">контроль геометрии пути важнее «подбивки»</text>
<text x="70" y="850" style="font-family:DejaVu Sans,Arial; font-size:17px; fill:#475569">Авторская схема. Пропорции условные: задача рисунка — показать цепочку жёсткости и опирания.</text>
</svg>