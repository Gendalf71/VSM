<svg baseProfile="full" height="900" version="1.1" viewBox="0 0 1400 900" width="1400" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs><marker id="arrow" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1d2737" /></marker><marker id="arrow_white" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><path d="M 0 0 L 10 5 L 0 10 z" fill="white" /></marker><marker id="dot" markerHeight="8" markerWidth="8" orient="auto" refX="4" refY="4"><circle cx="4" cy="4" fill="#1d2737" r="3" /></marker></defs><rect fill="#f7f8fb" height="900" width="1400" x="0" y="0" /><text fill="#1d2737" font-family="DejaVu Sans, Arial, sans-serif" font-size="34" font-weight="700" x="50" y="60">Рис. 2. Безбалластный путь ВСМ на слабом грунте</text><text fill="#5c6b80" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" x="50" y="95">Не новые рельсы, а жёсткая геометрия: рельс — плита — основание — сваи.</text><rect fill="#4b5563" height="60" width="20" x="410" y="190" /><rect fill="#4b5563" height="14" width="60" x="390" y="180" /><polygon fill="#f97316" points="395,240 445,240 435,275 405,275" /><rect fill="#4b5563" height="60" width="20" x="920" y="190" /><rect fill="#4b5563" height="14" width="60" x="900" y="180" /><polygon fill="#f97316" points="905,240 955,240 945,275 915,275" /><rect fill="#cbd5e1" height="55" rx="8" ry="8" stroke="#64748b" stroke-width="2" width="980" x="170" y="300" /><rect fill="#64748b" height="48" width="910" x="205" y="355" /><rect fill="#d7c3a2" height="400" width="1400" x="0" y="500" /><rect fill="#b69f7c" height="340" width="1400" x="0" y="560" /><rect fill="#94a3b8" height="220" stroke="#64748b" stroke-width="1.5" width="22" x="320" y="355" /><rect fill="#94a3b8" height="220" stroke="#64748b" stroke-width="1.5" width="22" x="470" y="355" /><rect fill="#94a3b8" height="220" stroke="#64748b" stroke-width="1.5" width="22" x="620" y="355" /><rect fill="#94a3b8" height="220" stroke="#64748b" stroke-width="1.5" width="22" x="785" y="355" /><rect fill="#94a3b8" height="220" stroke="#64748b" stroke-width="1.5" width="22" x="950" y="355" /><rect fill="#94a3b8" height="220" stroke="#64748b" stroke-width="1.5" width="22" x="1110" y="355" /><line marker-end="url(#arrow)" stroke="#1d2737" stroke-width="2.2" x1="520" x2="455" y1="155" y2="180" /><text fill="#1d2737" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" text-anchor="start" x="447" y="170">рельс / скрепление</text><line marker-end="url(#arrow)" stroke="#1d2737" stroke-width="2.2" x1="915" x2="1020" y1="145" y2="300" /><text fill="#1d2737" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" text-anchor="start" x="1036" y="305">бетонная плита</text><line marker-end="url(#arrow)" stroke="#1d2737" stroke-width="2.2" x1="920" x2="1030" y1="215" y2="350" /><text fill="#1d2737" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" text-anchor="start" x="1046" y="356">основание</text><line marker-end="url(#arrow)" stroke="#1d2737" stroke-width="2.2" x1="1125" x2="1121" y1="455" y2="455" /><text fill="#1d2737" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" text-anchor="start" x="1141" y="447">свая передаёт нагрузку в устойчивые слои</text><line marker-end="url(#arrow)" stroke="#1d2737" stroke-width="2.2" x1="170" x2="250" y1="615" y2="560" /><text fill="#1d2737" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" text-anchor="start" x="240" y="560">слабый грунт / мороз / сезонные деформации</text><text fill="#7b8799" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" x="50" y="872">Авторская схема. Проверочный смысл: показать слои, жёсткость опоры и отсутствие наложения подписей на конструкцию.</text></svg>