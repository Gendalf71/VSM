<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Рис. 6. Профиль 980 мм">
<title>Рис. 6. Профиль 980 мм</title>
<defs>
  <style>
    .bg { fill:#0f172a; }
    .panel { fill:#111827; stroke:#334155; stroke-width:2; }
    .panel2 { fill:#f8fafc; stroke:#cbd5e1; stroke-width:2; }
    .title { font-family:'DejaVu Sans', Arial, sans-serif; font-size:42px; font-weight:700; fill:#f8fafc; }
    .subtitle { font-family:'DejaVu Sans', Arial, sans-serif; font-size:24px; fill:#cbd5e1; }
    .label { font-family:'DejaVu Sans', Arial, sans-serif; font-size:22px; fill:#e5e7eb; }
    .small { font-family:'DejaVu Sans', Arial, sans-serif; font-size:17px; fill:#cbd5e1; }
    .darklabel { font-family:'DejaVu Sans', Arial, sans-serif; font-size:22px; fill:#111827; }
    .darksmall { font-family:'DejaVu Sans', Arial, sans-serif; font-size:17px; fill:#334155; }
    .note { font-family:'DejaVu Sans', Arial, sans-serif; font-size:15px; fill:#94a3b8; }
    .red { stroke:#ef4444; } .violet { stroke:#a855f7; } .cyan { stroke:#06b6d4; } .orange { stroke:#f59e0b; } .green { stroke:#22c55e; } .blue { stroke:#3b82f6; }
    .thin { stroke-width:3; fill:none; } .thick { stroke-width:9; fill:none; stroke-linecap:round; stroke-linejoin:round; }
    .dash { stroke-dasharray:16 10; }
  </style>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#e5e7eb" />
  </marker>
  <marker id="arrowDark" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#111827" />
  </marker>
</defs>

<rect x="0" y="0" width="1600" height="900" fill="#f8fafc"/>
<text x="70" y="78" style="font-family:DejaVu Sans,Arial; font-size:42px; font-weight:700; fill:#111827">Рис. 6. Кузовной профиль 980 мм: где вопрос к заводу</text>
<text x="70" y="116" style="font-family:DejaVu Sans,Arial; font-size:23px; fill:#475569">Схема показывает гипотезу по крупному алюминиевому профилю; точный смысл 980 мм требует заводского чертежа.</text>
<!-- profile cross section -->
<g transform="translate(260,210)">
 <rect x="0" y="0" width="420" height="500" rx="28" fill="#cbd5e1" stroke="#475569" stroke-width="6"/>
 <rect x="70" y="70" width="280" height="95" rx="15" fill="#f8fafc" stroke="#64748b" stroke-width="4"/>
 <rect x="70" y="205" width="280" height="95" rx="15" fill="#f8fafc" stroke="#64748b" stroke-width="4"/>
 <rect x="70" y="340" width="280" height="95" rx="15" fill="#f8fafc" stroke="#64748b" stroke-width="4"/>
 <line x1="420" y1="0" x2="520" y2="0" stroke="#111827" stroke-width="3"/>
 <line x1="420" y1="500" x2="520" y2="500" stroke="#111827" stroke-width="3"/>
 <line x1="500" y1="0" x2="500" y2="500" stroke="#111827" stroke-width="4" marker-start="url(#arrowDark)" marker-end="url(#arrowDark)"/>
 <text x="535" y="260" style="font-family:DejaVu Sans,Arial; font-size:26px; font-weight:700; fill:#111827">980 мм</text>
</g>
<!-- welding line -->
<rect x="850" y="230" width="420" height="120" rx="18" fill="#e2e8f0" stroke="#64748b" stroke-width="5"/>
<rect x="850" y="460" width="420" height="120" rx="18" fill="#e2e8f0" stroke="#64748b" stroke-width="5"/>
<path d="M850 405 C925 365,1020 445,1090 405 C1160 365,1225 440,1270 405" fill="none" stroke="#ef4444" stroke-width="8"/>
<text x="890" y="410" style="font-family:DejaVu Sans,Arial; font-size:22px; fill:#111827">сварной шов</text>
<line x1="1080" y1="405" x2="1210" y2="405" stroke="#111827" stroke-width="3" marker-end="url(#arrowDark)"/>
<text x="805" y="670" style="font-family:DejaVu Sans,Arial; font-size:22px; fill:#111827">Контроль: геометрия, остаточные напряжения, ультразвук/рентген, усталость</text>
<g stroke="#0ea5e9" stroke-width="4" stroke-dasharray="10 8" fill="none">
 <rect x="815" y="195" width="490" height="420" rx="28"/>
</g>
<text x="100" y="820" style="font-family:DejaVu Sans,Arial; font-size:18px; fill:#475569">Авторская схема. Не утверждает точную форму профиля; показывает технологические вопросы к заявлению о сварке профиля 980 мм.</text>
</svg>