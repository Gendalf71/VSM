<path d="M 835 390 C 880 370, 930 410, 975 390 S 1060 370, 1105 390" fill="none" stroke="#ef4444" stroke-width="4" /><text fill="#ef4444" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" text-anchor="middle" x="920" y="385">сварной шов</text><line marker-end="url(#arrow)" marker-start="url(#arrow)" stroke="#1d2737" stroke-width="2" x1="742" x2="742" y1="295" y2="480" /><text fill="#1d2737" font-family="DejaVu Sans, Arial, sans-serif" font-size="22" text-anchor="middle" transform="rotate(-90,720,392)" x="720" y="392">980 мм</text><line stroke="#1d2737" stroke-width="2" x1="742" x2="800" y1="295" y2="295" /><line stroke="#1d2737" stroke-width="2" x1="742" x2="800" y1="480" y2="480" /><text fill="#1d2737" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" x="760" y="655">Контроль: геометрия, остаточные напряжения, ультразвук/рентген.</text><text fill="#7b8799" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" x="50" y="872">Авторская схема. Не утверждает точную форму профиля; показывает технологический смысл заявления о сварке профиля 980 мм.</text></svg>