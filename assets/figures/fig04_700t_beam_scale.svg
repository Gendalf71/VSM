t="url(#arrow)" stroke="#1f2937" stroke-width="2" x1="340" x2="1240" y1="330" y2="330" /><text fill="#64748b" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" text-anchor="middle" x="790" y="310">длина условная; важен порядок масштаба</text><rect fill="#f59e0b" height="70" rx="10" stroke="#92400e" stroke-width="2" width="145" x="500" y="620" /><rect fill="#ffffff" height="18" rx="4" width="28" x="525" y="638" /><rect fill="#ffffff" height="18" rx="4" width="28" x="565" y="638" /><rect fill="#ffffff" height="18" rx="4" width="28" x="605" y="638" /><circle cx="530" cy="694" fill="#1f2937" r="13" /><circle cx="620" cy="694" fill="#1f2937" r="13" /><text fill="#64748b" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" text-anchor="middle" x="572" y="724">автобус</text><rect fill="#e7edf5" height="88" rx="24" stroke="#64748b" stroke-width="2" width="250" x="840" y="600" /><rect fill="#bae6fd" height="18" rx="4" width="32" x="890" y="625" /><rect fill="#bae6fd" height="18" rx="4" width="32" x="950" y="625" /><rect fill="#bae6fd" height="18" rx="4" width="32" x="1010" y="625" /><circle cx="900" cy="692" fill="#1f2937" r="13" /><circle cx="1030" cy="692" fill="#1f2937" r="13" /><text fill="#64748b" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" text-anchor="middle" x="965" y="724">вагон ВСМ, условно</text><rect fill="#ffffff" height="92" rx="12" ry="12" stroke="#cbd5e1" stroke-width="1.4" width="360" x="100" y="510" /><text fill="#1f2937" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="start" x="116" y="537">Заводская точность</text><text fill="#64748b" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="116" y="560">миллиметры на изделии становятся метрами</text><text fill="#64748b" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="116" y="577">проблемы на трассе</text><rect fill="#ffffff" height="92" rx="12" ry="12" stroke="#cbd5e1" stroke-width="1.4" width="340" x="1140" y="530" /><text fill="#1f2937" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="start" x="1156" y="557">Монтаж</text><text fill="#64748b" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="1156" y="580">подъём и установка требуют отдельной</text><text fill="#64748b" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="1156" y="597">логистики</text><text fill="#7a8799" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="60" y="866">Авторская схема по числу 700 т из сообщения Минтранса. Пропорции не являются заводским чертежом.</text></svg>