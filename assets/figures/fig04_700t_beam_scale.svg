<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Рис. 4. Балка 700 тонн">
<title>Рис. 4. Балка 700 тонн</title>
<defs>
  <style>
    .bg { fill:#0f172a; }
    .panel { fill:#111827; stroke:#334155; stroke-width:2; }
    .panel2 { fill:#f8fafc; stroke:#cbd5e1; stroke-width:2; }
    .title { font-family:'DejaVu Sans', Arial, sans-serif; font-size:42px; font-weight:700; fill:#f8fafc; }
    .subtitle { font-family:'DejaVu Sans', Arial, sans-serif; font-size:24px; fill:#cbd5e1; }
    .label { font-family:'DejaVu Sans', Arial, sans-serif; font-size:22px; fill:#e5e7eb; }
    .small { font-family:'DejaVu Sans', Arial, sans-serif; font-size:17px; fill:#cbd5e1; }
    .darklabel { font-family:'DejaVu Sans', Arial, sans-serif; font-size:22px; fill:#111827; }
    .darksmall { font-family:'DejaVu Sans', Arial, sans-serif; font-size:17px; fill:#334155; }
    .note { font-family:'DejaVu Sans', Arial, sans-serif; font-size:15px; fill:#94a3b8; }
    .red { stroke:#ef4444; } .violet { stroke:#a855f7; } .cyan { stroke:#06b6d4; } .orange { stroke:#f59e0b; } .green { stroke:#22c55e; } .blue { stroke:#3b82f6; }
    .thin { stroke-width:3; fill:none; } .thick { stroke-width:9; fill:none; stroke-linecap:round; stroke-linejoin:round; }
    .dash { stroke-dasharray:16 10; }
  </style>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#e5e7eb" />
  </marker>
  <marker id="arrowDark" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#111827" />
  </marker>
</defs>

<rect x="0" y="0" width="1600" height="900" fill="#f8fafc"/>
<text x="70" y="78" style="font-family:DejaVu Sans,Arial; font-size:42px; font-weight:700; fill:#111827">Рис. 4. Железобетонная балка 700 т: масштаб стройки</text>
<text x="70" y="116" style="font-family:DejaVu Sans,Arial; font-size:23px; fill:#475569">Для пассажира мост через Шошу — минуты ровного хода. Для строителей — сотни таких тяжёлых точных изделий.</text>
<!-- beam -->
<rect x="120" y="310" width="1360" height="115" rx="18" fill="#cbd5e1" stroke="#64748b" stroke-width="5"/>
<rect x="180" y="345" width="1240" height="38" rx="10" fill="#94a3b8" opacity="0.65"/>
<text x="650" y="382" style="font-family:DejaVu Sans,Arial; font-size:34px; font-weight:700; fill:#111827">700 тонн</text>
<text x="600" y="455" style="font-family:DejaVu Sans,Arial; font-size:22px; fill:#334155">изготовить → проверить → перевезти → поднять → поставить на опоры</text>
<!-- supports -->
<rect x="230" y="425" width="80" height="230" fill="#94a3b8" stroke="#64748b" stroke-width="4"/>
<rect x="1290" y="425" width="80" height="230" fill="#94a3b8" stroke="#64748b" stroke-width="4"/>
<rect x="0" y="655" width="1600" height="85" fill="#94a3b8"/>
<!-- bus -->
<g transform="translate(260,555)">
 <rect x="0" y="0" width="260" height="80" rx="18" fill="#f59e0b" stroke="#92400e" stroke-width="4"/>
 <rect x="25" y="18" width="45" height="28" rx="4" fill="#cffafe"/>
 <rect x="85" y="18" width="45" height="28" rx="4" fill="#cffafe"/>
 <rect x="145" y="18" width="45" height="28" rx="4" fill="#cffafe"/>
 <circle cx="60" cy="82" r="22" fill="#111827"/><circle cx="205" cy="82" r="22" fill="#111827"/>
 <text x="38" y="130" style="font-family:DejaVu Sans,Arial; font-size:20px; fill:#111827">автобус</text>
</g>
<!-- train car -->
<g transform="translate(650,520)">
 <rect x="0" y="0" width="430" height="115" rx="26" fill="#e5e7eb" stroke="#475569" stroke-width="5"/>
 <path d="M380 0 C430 30,430 85,380 115" fill="#cbd5e1"/>
 <rect x="55" y="28" width="58" height="32" rx="6" fill="#bae6fd"/>
 <rect x="135" y="28" width="58" height="32" rx="6" fill="#bae6fd"/>
 <rect x="215" y="28" width="58" height="32" rx="6" fill="#bae6fd"/>
 <circle cx="115" cy="120" r="20" fill="#111827"/><circle cx="320" cy="120" r="20" fill="#111827"/>
 <text x="110" y="175" style="font-family:DejaVu Sans,Arial; font-size:20px; fill:#111827">вагон ВСМ, условно</text>
</g>
<!-- dimension arrow -->
<line x1="120" y1="260" x2="1480" y2="260" stroke="#111827" stroke-width="4" marker-start="url(#arrowDark)" marker-end="url(#arrowDark)"/>
<text x="620" y="245" style="font-family:DejaVu Sans,Arial; font-size:22px; fill:#111827">длина показана условно: важен порядок масштаба</text>
<text x="70" y="835" style="font-family:DejaVu Sans,Arial; font-size:17px; fill:#475569">Авторская схема по числу 700 т из сообщения Минтранса. Пропорции не являются заводским чертежом.</text>
</svg>