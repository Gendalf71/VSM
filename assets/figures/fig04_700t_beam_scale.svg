<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="900" version="1.1" viewBox="0 0 1400 900" width="1400" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs><marker id="arrow" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1d2737" /></marker><marker id="arrow_white" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><path d="M 0 0 L 10 5 L 0 10 z" fill="white" /></marker><marker id="dot" markerHeight="8" markerWidth="8" orient="auto" refX="4" refY="4"><circle cx="4" cy="4" fill="#1d2737" r="3" /></marker></defs><rect fill="#f7f8fb" height="900" width="1400" x="0" y="0" /><text fill="#1d2737" font-family="DejaVu Sans, Arial, sans-serif" font-size="34" font-weight="700" x="50" y="60">Рис. 4. Железобетонная балка 700 т: масштаб стройки</text><text fill="#5c6b80" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" x="50" y="95">Для пассажира мост через Шошу — минуту ровного хода. Для строителя — сотни таких точных изделий.</text><rect fill="#94a3b8" height="40" width="1400" x="0" y="710" /><rect fill="#a8b1bf" height="370" width="40" x="250" y="340" /><rect fill="#a8b1bf" height="370" width="40" x="1130" y="340" /><rect fill="#cbd5e1" height="95" rx="10" stroke="#64748b" stroke-width="2" width="840" x="280" y="405" /><rect fill="#b7c3d5" height="40" rx="10" width="770" x="315" y="432" /><text fill="#1d2737" font-family="DejaVu Sans, Arial, sans-serif" font-size="32" font-weight="700" text-anchor="middle" x="700" y="468">700 тонн</text><line marker-end="url(#arrow)" marker-start="url(#arrow)" stroke="#1d2737" stroke-width="2" x1="270" x2="1110" y1="355" y2="355" /><text fill="#5c6b80" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" text-anchor="middle" x="690" y="340">длина условная; важен порядок масштаба</text><rect fill="#f59e0b" height="58" rx="8" stroke="#92400e" stroke-width="2" width="120" x="385" y="590" /><rect fill="#f8fafc" height="16" rx="3" width="22" x="408" y="604" /><rect fill="#f8fafc" height="16" rx="3" width="22" x="440" y="604" /><rect fill="#f8fafc" height="16" rx="3" width="22" x="472" y="604" /><circle cx="418" cy="652" fill="#1f2937" r="11" /><circle cx="480" cy="652" fill="#1f2937" r="11" /><text fill="#5c6b80" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" text-anchor="middle" x="445" y="687">автобус</text><rect fill="#e5e7eb" height="84" rx="20" stroke="#64748b" stroke-width="2" width="220" x="720" y="565" /><rect fill="#bae6fd" height="18" rx="3" width="26" x="770" y="588" /><rect fill="#bae6fd" height="18" rx="3" width="26" x="830" y="588" /><rect fill="#bae6fd" height="18" rx="3" width="26" x="890" y="588" /><circle cx="790" cy="650" fill="#1f2937" r="12" /><circle cx="895" cy="650" fill="#1f2937" r="12" /><text fill="#5c6b80" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" text-anchor="middle" x="830" y="687">вагон ВСМ, условный</text><text fill="#1d2737" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" text-anchor="middle" x="700" y="555">изготовить → проверить → перевезти → поднять → поставить на опоры</text><text fill="#7b8799" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" x="50" y="872">Авторская схема по числу 700 т из сообщения Минтранса. Пропорции не являются заводским чертежом.</text></svg>