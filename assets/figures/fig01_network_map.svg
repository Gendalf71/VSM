<svg baseProfile="full" height="900" version="1.1" viewBox="0 0 1600 900" width="1600" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs><marker id="arrow" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937" /></marker><marker id="arrow_white" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff" /></marker><marker id="arrow_red" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" /></marker><marker id="arrow_blue" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" /></marker><marker id="arrow_green" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e" /></marker></defs><rect fill="#0b1736" height="900" width="1600" x="0" y="0" /><text fill="#ffffff" font-family="DejaVu Sans, Arial, sans-serif" font-size="38" font-weight="700" text-anchor="start" x="60" y="58">Фото 1. Сеть ВСМ от Москвы: схема для проверки чисел</text><text fill="#cbd5e1" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" font-weight="normal" text-anchor="start" x="60" y="96">Авторская реконструкция: направления разведены, спорная подпись южного луча вынесена отдельно.</text><path d="M120,300 C260,210 390,250 510,210 C650,160 790,210 940,180 C1100,150 1260,210 1440,185" fill="none" opacity="0.65" stroke="#203a63" stroke-width="3" /><rect fill="#142449" height="120" rx="12" ry="12" stroke="#315281" stroke-width="1.4" width="350" x="80" y="165" /><text fill="#ffffff" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="start" x="96" y="192">Минск</text><text fill="#d5deec" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="96" y="215">715 км / около 3 ч</text><text fill="#d5deec" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="96" y="232">средняя ≈ 238 км/ч</text><rect fill="#142449" height="110" rx="12" ry="12" stroke="#315281" stroke-width="1.4" width="430" x="80" y="695" /><text fill="#ffffff" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="start" x="96" y="722">Контроль южного луча</text><text fill="#d5deec" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="96" y="745">Подпись 715 км / 3 ч нельзя принимать как</text><text fill="#d5deec" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="96" y="762">параметр полного маршрута Москва — Адлер.</text><rect fill="#142449" height="120" rx="12" ry="12" stroke="#315281" stroke-width="1.4" width="350" x="1160" y="145" /><text fill="#ffffff" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="start" x="1176" y="172">Санкт-Петербург</text><text fill="#d5deec" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="1176" y="195">679 км / 2 ч 15 мин</text><text fill="#d5deec" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="1176" y="212">средняя ≈ 302 км/ч</text><rect fill="#142449" height="120" rx="12" ry="12" stroke="#315281" stroke-width="1.4" width="350" x="1160" y="305" /><text fill="#ffffff" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="start" x="1176" y="332">Екатеринбург</text><text fill="#d5deec" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="1176" y="355">1532 км / 6 ч 36 мин</text><text fill="#d5deec" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="1176" y="372">средняя ≈ 232 км/ч</text><rect fill="#142449" height="120" rx="12" ry="12" stroke="#315281" stroke-width="1.4" width="350" x="1160" y="475" /><text fill="#ffffff" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="start" x="1176" y="502">Рязань</text><text fill="#d5deec" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="1176" y="525">205 км / 1 ч 05 мин</text><rect fill="#142449" height="120" rx="12" ry="12" stroke="#315281" stroke-width="1.4" width="350" x="1160" y="645" /><text fill="#ffffff" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="start" x="1176" y="672">Адлер</text><text fill="#d5deec" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="1176" y="695">полное направление по отраслевым</text><text fill="#d5deec" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="1176" y="712">материалам:</text><text fill="#d5deec" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="1176" y="729">≈1540 км / ≈7 ч 50 мин</text><circle cx="785" cy="460" fill="#ffffff" r="46" stroke="#38bdf8" stroke-width="5" /><text fill="#0b1736" font-family="DejaVu Sans, Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" x="785" y="468">Москва</text><path d="M785,460 C972.5,340 972.5,325 1160,205" fill="none" opacity="0.95" stroke="#ef4444" stroke-linecap="round" stroke-width="6" /><circle cx="1160" cy="205" fill="#ef4444" r="8" stroke="#ffffff" stroke-width="2" /><path d="M785,460 C607.5,340 607.5,345 430,225" fill="none" opacity="0.95" stroke="#a855f7" stroke-linecap="round" stroke-width="6" /><circle cx="430" cy="225" fill="#a855f7" r="8" stroke="#ffffff" stroke-width="2" /><path d="M785,460 C972.5,340 972.5,485 1160,365" fill="none" opacity="0.95" stroke="#f59e0b" stroke-linecap="round" stroke-width="6" /><circle cx="1160" cy="365" fill="#f59e0b" r="8" stroke="#ffffff" stroke-width="2" /><path d="M785,460 C972.5,340 972.5,655 1160,535" fill="none" opacity="0.95" stroke="#38bdf8" stroke-linecap="round" stroke-width="6" /><circle cx="1160" cy="535" fill="#38bdf8" r="8" stroke="#ffffff" stroke-width="2" /><path d="M785,460 C972.5,340 972.5,825 1160,705" fill="none" opacity="0.95" stroke="#22c55e" stroke-linecap="round" stroke-width="6" /><circle cx="1160" cy="705" fill="#22c55e" r="8" stroke="#ffffff" stroke-width="2" /><circle cx="980" cy="390" fill="#fbbf24" r="7" stroke="#ffffff" stroke-width="2" /><text fill="#ffffff" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" font-weight="700" x="994" y="380">Нижний Новгород</text><circle cx="1070" cy="350" fill="#f59e0b" r="7" stroke="#ffffff" stroke-width="2" /><text fill="#ffffff" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" font-weight="700" x="1084" y="340">Казань</text><circle cx="980" cy="630" fill="#22c55e" r="7" stroke="#ffffff" stroke-width="2" /><text fill="#ffffff" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" font-weight="700" x="994" y="620">Воронеж</text><text fill="#aebbd0" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="normal" text-anchor="start" x="60" y="866">Авторская схема; все подписи вынесены в свободные зоны, чтобы не перекрывать маршруты.</text></svg>