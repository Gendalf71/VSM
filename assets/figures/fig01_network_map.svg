<svg baseProfile="full" height="900" version="1.1" viewBox="0 0 1400 900" width="1400" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs><marker id="arrow" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1d2737" /></marker><marker id="arrow_white" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><path d="M 0 0 L 10 5 L 0 10 z" fill="white" /></marker><marker id="dot" markerHeight="8" markerWidth="8" orient="auto" refX="4" refY="4"><circle cx="4" cy="4" fill="#1d2737" r="3" /></marker></defs><rect fill="#0b1736" height="900" width="1400" x="0" y="0" /><text fill="white" font-family="DejaVu Sans, Arial, sans-serif" font-size="34" font-weight="700" x="50" y="60">Фото 1. Сеть ВСМ от Москвы: схема для проверки чисел</text><text fill="#cfd6e2" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" x="50" y="95">Авторская реконструкция по публикации Минтранса; южная подпись 715 км / 3 ч помечена как требующая сверки.</text><circle cx="680" cy="455" fill="white" r="34" stroke="#8bd3ff" stroke-width="4" /><text fill="#0b1736" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle" x="680" y="462">Москва</text><path d="M 680,455 L 760,390 L 850,300 L 940,230 L 1050,180" fill="none" stroke="#ff5a5f" stroke-linecap="round" stroke-width="6" /><circle cx="1050" cy="180" fill="#ff5a5f" r="8" stroke="white" stroke-width="2" /><text fill="white" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="end" x="1035" y="172">Санкт-Петербург</text><text fill="#cfd6e2" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" text-anchor="end" x="1035" y="197">679 км / 2 ч 15 мин</text><text fill="#aeb8c8" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" text-anchor="end" x="1035" y="217">средняя ≈ 302 км/ч</text><path d="M 680,455 L 560,440 L 470,425 L 360,410 L 250,390" fill="none" stroke="#a855f7" stroke-linecap="round" stroke-width="6" /><circle cx="250" cy="390" fill="#a855f7" r="8" stroke="white" stroke-width="2" /><text fill="white" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="end" x="235" y="382">Минск</text><text fill="#cfd6e2" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" text-anchor="end" x="235" y="407">715 км / около 3 ч</text><text fill="#aeb8c8" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" text-anchor="end" x="235" y="427">средняя ≈ 238 км/ч</text><path d="M 680,455 L 810,470 L 900,490 L 980,500" fill="none" stroke="#38bdf8" stroke-linecap="round" stroke-width="6" /><circle cx="980" cy="500" fill="#38bdf8" r="8" stroke="white" stroke-width="2" /><text fill="white" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="start" x="995" y="492">Рязань</text><text fill="#cfd6e2" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" text-anchor="start" x="995" y="517">205 км / 1 ч 05 мин</text><path d="M 680,455 L 760,520 L 840,575 L 920,610" fill="none" stroke="#22c55e" stroke-linecap="round" stroke-width="6" /><circle cx="920" cy="610" fill="#22c55e" r="8" stroke="white" stroke-width="2" /><text fill="white" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="start" x="935" y="602">Воронеж</text><path d="M 680,455 L 770,530 L 880,610 L 1000,680 L 1150,720" fill="none" stroke="#22c55e" stroke-linecap="round" stroke-width="6" /><circle cx="770" cy="530" fill="#22c55e" r="6" /><circle cx="880" cy="610" fill="#22c55e" r="6" /><circle cx="1000" cy="680" fill="#22c55e" r="6" /><circle cx="1150" cy="720" fill="#22c55e" r="8" stroke="white" stroke-width="2" /><text fill="white" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="end" x="1135" y="712">Адлер</text><text fill="#cfd6e2" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" text-anchor="end" x="1135" y="737">южный луч</text><text fill="#aeb8c8" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" text-anchor="end" x="1135" y="757">подпись на схеме требует проверки</text><path d="M 680,455 L 815,425 L 925,385 L 1035,340" fill="none" stroke="#fbbf24" stroke-linecap="round" stroke-width="6" /><circle cx="815" cy="425" fill="#fbbf24" r="6" /><circle cx="925" cy="385" fill="#fbbf24" r="6" /><circle cx="1035" cy="340" fill="#fbbf24" r="8" stroke="white" stroke-width="2" /><text fill="white" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="end" x="1020" y="332">Нижний Новгород</text><path d="M 680,455 L 830,405 L 980,340 L 1080,310 L 1160,270" fill="none" stroke="#f59e0b" stroke-linecap="round" stroke-width="6" /><circle cx="830" cy="405" fill="#f59e0b" r="6" /><circle cx="980" cy="340" fill="#f59e0b" r="6" /><circle cx="1080" cy="310" fill="#f59e0b" r="6" /><circle cx="1160" cy="270" fill="#f59e0b" r="8" stroke="white" stroke-width="2" /><text fill="white" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="end" x="1145" y="262">Казань</text><path d="M 680,455 L 850,380 L 990,310 L 1140,235 L 1290,150" fill="none" stroke="#f59e0b" stroke-linecap="round" stroke-width="6" /><circle cx="850" cy="380" fill="#f59e0b" r="6" /><circle cx="990" cy="310" fill="#f59e0b" r="6" /><circle cx="1140" cy="235" fill="#f59e0b" r="6" /><circle cx="1290" cy="150" fill="#f59e0b" r="8" stroke="white" stroke-width="2" /><text fill="white" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="end" x="1275" y="142">Екатеринбург</text><text fill="#cfd6e2" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" text-anchor="end" x="1275" y="167">1532 км / 6 ч 36 мин</text><text fill="#aeb8c8" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" text-anchor="end" x="1275" y="187">средняя ≈ 232 км/ч</text><rect fill="#122449" height="120" rx="14" ry="14" stroke="#28406c" stroke-width="1.2" width="450" x="55" y="690" /><text fill="white" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" x="73" y="718">Контрольная пометка:</text><text fill="white" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" x="73" y="738">Питер: 715 км / 3 ч у южного луча в исходной инфографике</text><text fill="white" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" x="73" y="758">нельзя принимать за параметр полного маршрута Москва — Адлер.</text><text fill="#b3bfd2" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" x="50" y="872">Авторская схема; задача — аккуратно показать направления и спорную подпись без наложения текста.</text></svg>