<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Рис. 8. Сравнение скоростей">
<title>Рис. 8. Сравнение скоростей</title>
<defs>
  <style>
    .bg { fill:#0f172a; }
    .panel { fill:#111827; stroke:#334155; stroke-width:2; }
    .panel2 { fill:#f8fafc; stroke:#cbd5e1; stroke-width:2; }
    .title { font-family:'DejaVu Sans', Arial, sans-serif; font-size:42px; font-weight:700; fill:#f8fafc; }
    .subtitle { font-family:'DejaVu Sans', Arial, sans-serif; font-size:24px; fill:#cbd5e1; }
    .label { font-family:'DejaVu Sans', Arial, sans-serif; font-size:22px; fill:#e5e7eb; }
    .small { font-family:'DejaVu Sans', Arial, sans-serif; font-size:17px; fill:#cbd5e1; }
    .darklabel { font-family:'DejaVu Sans', Arial, sans-serif; font-size:22px; fill:#111827; }
    .darksmall { font-family:'DejaVu Sans', Arial, sans-serif; font-size:17px; fill:#334155; }
    .note { font-family:'DejaVu Sans', Arial, sans-serif; font-size:15px; fill:#94a3b8; }
    .red { stroke:#ef4444; } .violet { stroke:#a855f7; } .cyan { stroke:#06b6d4; } .orange { stroke:#f59e0b; } .green { stroke:#22c55e; } .blue { stroke:#3b82f6; }
    .thin { stroke-width:3; fill:none; } .thick { stroke-width:9; fill:none; stroke-linecap:round; stroke-linejoin:round; }
    .dash { stroke-dasharray:16 10; }
  </style>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#e5e7eb" />
  </marker>
  <marker id="arrowDark" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#111827" />
  </marker>
</defs>

<rect x="0" y="0" width="1600" height="900" fill="#f8fafc"/>
<text x="70" y="78" style="font-family:DejaVu Sans,Arial; font-size:42px; font-weight:700; fill:#111827">Рис. 8. Где будущая российская ВСМ на мировой шкале</text>
<text x="70" y="116" style="font-family:DejaVu Sans,Arial; font-size:23px; fill:#475569">Сравнение коммерческих/эксплуатационных скоростей и проектных ориентиров из статьи.</text>
<!-- axis -->
<line x1="360" y1="720" x2="1380" y2="720" stroke="#111827" stroke-width="4" marker-end="url(#arrowDark)"/>
<text x="1290" y="760" style="font-family:DejaVu Sans,Arial; font-size:20px; fill:#111827">км/ч</text>
<g stroke="#cbd5e1" stroke-width="2">
 <line x1="560" y1="170" x2="560" y2="720"/><line x1="760" y1="170" x2="760" y2="720"/><line x1="960" y1="170" x2="960" y2="720"/><line x1="1160" y1="170" x2="1160" y2="720"/><line x1="1360" y1="170" x2="1360" y2="720"/>
</g>
<g style="font-family:DejaVu Sans,Arial; font-size:18px; fill:#475569"><text x="548" y="750">200</text><text x="748" y="750">300</text><text x="948" y="750">400</text><text x="1148" y="750">500</text><text x="1348" y="750">600</text></g>
<!-- bars: scale x = 360 + speed*2 -->
<g style="font-family:DejaVu Sans,Arial; font-size:22px; fill:#111827">
 <text x="90" y="220">«Сапсан»</text>
 <text x="90" y="300">Tokaido Shinkansen</text>
 <text x="90" y="380">TGV</text>
 <text x="90" y="460">Fuxing / CR400</text>
 <text x="90" y="540">Будущий ЭВС360</text>
 <text x="90" y="620">Shanghai Maglev</text>
</g>
<g>
 <rect x="360" y="190" width="500" height="42" rx="12" fill="#94a3b8"/><text x="875" y="219" style="font-family:DejaVu Sans,Arial; font-size:20px; fill:#111827">250</text>
 <rect x="360" y="270" width="570" height="42" rx="12" fill="#60a5fa"/><text x="945" y="299" style="font-family:DejaVu Sans,Arial; font-size:20px; fill:#111827">285</text>
 <rect x="360" y="350" width="640" height="42" rx="12" fill="#2563eb"/><text x="1015" y="379" style="font-family:DejaVu Sans,Arial; font-size:20px; fill:#111827">320</text>
 <rect x="360" y="430" width="700" height="42" rx="12" fill="#f59e0b"/><text x="1075" y="459" style="font-family:DejaVu Sans,Arial; font-size:20px; fill:#111827">350</text>
 <rect x="360" y="510" width="720" height="42" rx="12" fill="#ef4444"/><text x="1095" y="539" style="font-family:DejaVu Sans,Arial; font-size:20px; fill:#111827">360 экспл. / до 400</text>
 <rect x="360" y="590" width="860" height="42" rx="12" fill="#a855f7"/><text x="1235" y="619" style="font-family:DejaVu Sans,Arial; font-size:20px; fill:#111827">430</text>
</g>
<rect x="70" y="790" width="1250" height="60" rx="15" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2"/>
<text x="95" y="828" style="font-family:DejaVu Sans,Arial; font-size:19px; fill:#334155">Урок: рекордная скорость не равна успеху. Нужны частота, загрузка, обслуживание, безопасность и экономика.</text>
</svg>