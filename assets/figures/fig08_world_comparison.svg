sans-serif" font-size="20" x="120" y="522">Fuxing / CR400</text><rect fill="#f59e0b" height="24" opacity="0.95" rx="10" ry="10" width="513.3333333333334" x="360" y="500" /><text fill="#1d2737" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" x="885.3333333333334" y="518">350</text><text fill="#1d2737" font-family="DejaVu Sans, Arial, sans-serif" font-size="20" x="120" y="592">Будущий ЭВС360</text><rect fill="#ef4444" height="24" opacity="0.95" rx="10" ry="10" width="528.0" x="360" y="570" /><text fill="#1d2737" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" x="900.0" y="588">360 / до 400</text><text fill="#1d2737" font-family="DejaVu Sans, Arial, sans-serif" font-size="20" x="120" y="662">Shanghai Maglev</text><rect fill="#a855f7" height="24" opacity="0.95" rx="10" ry="10" width="630.6666666666666" x="360" y="640" /><text fill="#1d2737" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" x="1002.6666666666666" y="658">430</text><rect fill="#eef2f8" height="76" rx="14" ry="14" stroke="#cbd5e1" stroke-width="1.2" width="1260" x="70" y="770" /><text fill="#1d2737" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" x="88" y="798">Урок: рекордная скорость не равна успеху. Нужны частота, загрузка, обслуживание, безопасность и экономика.</text><text fill="#7b8799" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" x="50" y="872">Сравнение не претендует на исчерпывающую энциклопедию; задача — показать место проекта на понятной шкале скоростей.</text></svg>