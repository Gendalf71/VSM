<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Рис. 7. Тормозная кривая ВСМ">
<title>Рис. 7. Тормозная кривая ВСМ</title>
<defs>
  <style>
    .bg { fill:#0f172a; }
    .panel { fill:#111827; stroke:#334155; stroke-width:2; }
    .panel2 { fill:#f8fafc; stroke:#cbd5e1; stroke-width:2; }
    .title { font-family:'DejaVu Sans', Arial, sans-serif; font-size:42px; font-weight:700; fill:#f8fafc; }
    .subtitle { font-family:'DejaVu Sans', Arial, sans-serif; font-size:24px; fill:#cbd5e1; }
    .label { font-family:'DejaVu Sans', Arial, sans-serif; font-size:22px; fill:#e5e7eb; }
    .small { font-family:'DejaVu Sans', Arial, sans-serif; font-size:17px; fill:#cbd5e1; }
    .darklabel { font-family:'DejaVu Sans', Arial, sans-serif; font-size:22px; fill:#111827; }
    .darksmall { font-family:'DejaVu Sans', Arial, sans-serif; font-size:17px; fill:#334155; }
    .note { font-family:'DejaVu Sans', Arial, sans-serif; font-size:15px; fill:#94a3b8; }
    .red { stroke:#ef4444; } .violet { stroke:#a855f7; } .cyan { stroke:#06b6d4; } .orange { stroke:#f59e0b; } .green { stroke:#22c55e; } .blue { stroke:#3b82f6; }
    .thin { stroke-width:3; fill:none; } .thick { stroke-width:9; fill:none; stroke-linecap:round; stroke-linejoin:round; }
    .dash { stroke-dasharray:16 10; }
  </style>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#e5e7eb" />
  </marker>
  <marker id="arrowDark" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#111827" />
  </marker>
</defs>

<rect x="0" y="0" width="1600" height="900" fill="#fff"/>
<text x="70" y="78" style="font-family:DejaVu Sans,Arial; font-size:42px; font-weight:700; fill:#111827">Рис. 7. Тормозная кривая: где автоматика сильнее реакции человека</text>
<text x="70" y="116" style="font-family:DejaVu Sans,Arial; font-size:23px; fill:#475569">ATP/ETCS-аналог не ждёт, пока машинист «почувствует»: скорость контролируется по безопасной кривой.</text>
<!-- axes -->
<line x1="170" y1="720" x2="1420" y2="720" stroke="#111827" stroke-width="4" marker-end="url(#arrowDark)"/>
<line x1="170" y1="720" x2="170" y2="180" stroke="#111827" stroke-width="4" marker-end="url(#arrowDark)"/>
<text x="1300" y="765" style="font-family:DejaVu Sans,Arial; font-size:22px; fill:#111827">дистанция до цели</text>
<text x="80" y="170" style="font-family:DejaVu Sans,Arial; font-size:22px; fill:#111827">скорость</text>
<!-- grid -->
<g stroke="#e5e7eb" stroke-width="2">
 <line x1="170" y1="600" x2="1420" y2="600"/><line x1="170" y1="480" x2="1420" y2="480"/><line x1="170" y1="360" x2="1420" y2="360"/><line x1="170" y1="240" x2="1420" y2="240"/>
 <line x1="420" y1="180" x2="420" y2="720"/><line x1="670" y1="180" x2="670" y2="720"/><line x1="920" y1="180" x2="920" y2="720"/><line x1="1170" y1="180" x2="1170" y2="720"/>
</g>
<!-- curves -->
<path d="M200 255 C450 248,650 260,835 300 C1030 343,1195 460,1340 690" fill="none" stroke="#ef4444" stroke-width="8"/>
<path d="M200 320 C480 320,705 335,875 385 C1070 445,1190 555,1300 720" fill="none" stroke="#3b82f6" stroke-width="7" stroke-dasharray="16 10"/>
<path d="M200 265 C470 265,700 280,870 335 C1025 385,1140 505,1235 715" fill="none" stroke="#22c55e" stroke-width="6"/>
<!-- safe stop -->
<line x1="1300" y1="160" x2="1300" y2="740" stroke="#111827" stroke-width="4" stroke-dasharray="12 8"/>
<text x="1160" y="150" style="font-family:DejaVu Sans,Arial; font-size:22px; font-weight:700; fill:#111827">точка безопасной остановки</text>
<circle cx="1235" cy="715" r="12" fill="#22c55e"/>
<!-- legend -->
<rect x="830" y="205" width="540" height="150" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="3"/>
<line x1="860" y1="245" x2="930" y2="245" stroke="#ef4444" stroke-width="8"/><text x="950" y="252" style="font-family:DejaVu Sans,Arial; font-size:21px; fill:#111827">разрешённая скорость</text>
<line x1="860" y1="290" x2="930" y2="290" stroke="#3b82f6" stroke-width="7" stroke-dasharray="16 10"/><text x="950" y="297" style="font-family:DejaVu Sans,Arial; font-size:21px; fill:#111827">фактическая скорость</text>
<line x1="860" y1="335" x2="930" y2="335" stroke="#22c55e" stroke-width="6"/><text x="950" y="342" style="font-family:DejaVu Sans,Arial; font-size:21px; fill:#111827">аварийная тормозная кривая</text>
<text x="210" y="815" style="font-family:DejaVu Sans,Arial; font-size:18px; fill:#475569">Если фактическая скорость пересекает безопасную кривую, автоматика должна вмешаться раньше человека.</text>
</svg>